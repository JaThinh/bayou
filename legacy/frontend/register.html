<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Bayou Ticket</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" href="./assets/logos/favicon.png.png" type="image/png">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <!-- Đường viền xanh trên cùng -->
            <div class="card-top-line"></div>
            
            <!-- Selector ngôn ngữ góc phải -->
            <div class="lang-selector">
                <img src="https://flagcdn.com/w20/vn.png" alt="VN"> ▾
            </div>
            
            <h2 class="login-title">Đăng ký tài khoản</h2>
            
            <form class="login-form" id="register-form">
                <div class="input-group">
                    <input type="text" placeholder="Họ và tên" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Mật khẩu" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Xác nhận mật khẩu" required>
                </div>
                
                <button type="submit" class="btn-submit-login">Tạo tài khoản</button>
                
                <div class="register-link">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
                
                <div class="back-home">
                    <a href="index.html">Trở về trang chủ</a>
                </div>
            </form>
        </div>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
