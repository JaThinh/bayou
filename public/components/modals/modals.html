<div class="modal" id="booking-modal">
    <div class="modal__dialog">
        <div class="modal__header">
            <h3 class="modal__title">Tìm kiếm chi tiết đặt chỗ</h3>
            <button class="modal__close-btn" id="booking-modal-close">✕</button>
        </div>
        <div class="modal__body">
            <div class="modal__input-row">
                <div class="modal__icon">🎫</div>
                <input type="text" class="modal__input" id="booking-code" placeholder="Nhập mã Booking">
            </div>
            <div class="modal__input-row">
                <div class="modal__icon">+84</div>
                <input type="tel" class="modal__input" id="booking-phone" placeholder="(982837841)">
            </div>
        </div>
        <div class="modal__footer">
            <button class="modal__submit-btn" id="booking-submit">Tìm Kiếm 🔍</button>
        </div>
    </div>
</div>
