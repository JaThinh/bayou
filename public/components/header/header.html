<header class="header">
    <div class="header__left">
        <img src="./assets/logos/bayou_logo.png" alt="Bayou Travel" class="header__logo">
    </div>
    <div class="header__right">
        <div class="lang-selector">
            <button class="lang-selector__btn" id="btn-lang">
                <span id="current-lang-text">VN</span>
            </button>
            <div class="lang-selector__dropdown" id="lang-dropdown">
                <div class="lang-selector__title">Ngôn ngữ</div>
                <div class="lang-selector__option">
                    <img src="https://flagcdn.com/w20/us.png" alt="EN" class="lang-selector__flag"> English <span class="lang-selector__check">✔</span>
                </div>
                <div class="lang-selector__option lang-selector__option--active">
                    <img src="https://flagcdn.com/w20/vn.png" alt="VN" class="lang-selector__flag"> Tiếng Việt <span class="lang-selector__check">✔</span>
                </div>
            </div>
        </div>
        <button class="header__btn header__btn--exchange" id="btn-exchange">Tỷ giá: Đang cập nhật...</button>
        <button class="header__btn header__btn--booking" id="btn-booking">Tìm kiếm đặt chỗ</button>
        <button class="header__btn header__btn--login" id="btn-login">👤 Đăng nhập</button>
    </div>
</header>
